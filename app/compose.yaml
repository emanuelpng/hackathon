networks:
    luna_microservices:
        name: luna_microservices
        external: true

services:
    laravel.test:
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
        entrypoint:
            - /bin/bash
            - -c
            - |
                cat /tmp/httptoolkit-ca.pem >> /etc/ssl/certs/ca-certificates.crt
                exec start-container
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            HTTP_PROXY: 'http://host.docker.internal:8000'
            HTTPS_PROXY: 'http://host.docker.internal:8000'
            NO_PROXY: 'localhost,127.0.0.1,ms_mysql,ms_redis'
            CURL_CA_BUNDLE: '/etc/ssl/certs/ca-certificates.crt'
        volumes:
            - '.:/var/www/html'
            - '/home/andreribeiro/.config/httptoolkit/ca.pem:/tmp/httptoolkit-ca.pem:ro'
        networks:
            - luna_microservices
