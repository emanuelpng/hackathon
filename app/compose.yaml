networks:
    luna_microservices:
        name: luna_microservices
        external: true

services:
    laravel.test:
        build:
            context: './docker/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
            HTTP_PROXY: 'http://host.docker.internal:8000'
            HTTPS_PROXY: 'http://host.docker.internal:8000'
            NO_PROXY: 'localhost,127.0.0.1,ms_mysql,ms_redis'
        volumes:
            - '.:/var/www/html'
        networks:
            - luna_microservices
